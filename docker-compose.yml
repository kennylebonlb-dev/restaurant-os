services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurant_os
      POSTGRES_PASSWORD: restaurant_os
      POSTGRES_DB: restaurant_os
    ports:
      - "5432:5432"
    volumes:
      - restaurant-os-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_os -d restaurant_os"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  restaurant-os-postgres-data:
